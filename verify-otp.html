<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인증 코드 입력 — MyRealTrip Alumni</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-card__brand">
        <a href="index.html" class="brand">
          <span class="brand__mark">M</span>
          <span class="brand__name">MyRealTrip <span class="brand__sub">Alumni</span></span>
        </a>
      </div>

      <h1 class="auth-card__title">인증 코드를 입력해주세요</h1>
      <p class="auth-card__sub">
        <strong>yoonjae.lee@gmail.com</strong>으로 보낸<br/>
        6자리 코드를 입력해주세요.
      </p>

      <form action="register.html" method="get">
        <div class="otp-row">
          <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" size="1" autofocus />
          <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" size="1" />
          <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" size="1" />
          <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" size="1" />
          <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" size="1" />
          <input class="otp-cell" type="text" inputmode="numeric" maxlength="1" size="1" />
        </div>

        <p class="caption text-center mb-6" style="margin-top:8px;">
          남은 시간 <strong class="text-primary">04:58</strong>
        </p>

        <button type="submit" class="btn btn--primary btn--lg btn--block">
          확인 <span data-icon="arrowRight"></span>
        </button>

        <div class="row" style="justify-content:space-between; margin-top: 20px;">
          <a href="login.html" class="caption" style="color:var(--gray-700);">
            <span data-icon="arrowLeft" style="display:inline-block; vertical-align:middle;"></span>
            이메일 다시 입력
          </a>
          <button type="button" class="caption" style="color:var(--primary); font-weight:500; background:none; border:none; cursor:pointer;">
            인증 코드 재전송
          </button>
        </div>
      </form>
    </div>

    <div class="alert" style="margin-top: 24px; max-width: 440px;">
      <span data-icon="shield" class="icon"></span>
      <div>
        <div class="alert__title">스팸함을 확인해주세요</div>
        <div class="alert__body">이메일이 도착하지 않았다면 스팸/프로모션 폴더를 확인하거나 재전송을 눌러주세요.</div>
      </div>
    </div>
  </div>

  <script src="assets/partials.js"></script>
</body>
</html>
