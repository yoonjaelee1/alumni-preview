<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — MyRealTrip Alumni</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-card__brand">
        <a href="index.html" class="brand">
          <span class="brand__mark">M</span>
          <span class="brand__name">MyRealTrip <span class="brand__sub">Alumni</span></span>
        </a>
      </div>

      <h1 class="auth-card__title">로그인</h1>
      <p class="auth-card__sub">개인 이메일을 입력하시면 인증 코드를 전송해 드립니다.</p>

      <form action="verify-otp.html" method="get">
        <div class="field">
          <label class="label label__required" for="email">개인 이메일</label>
          <input class="input input--lg" type="email" id="email" placeholder="example@gmail.com" required autofocus />
          <p class="help">회사 이메일이 아닌 개인 이메일을 입력해 주세요.</p>
        </div>

        <button type="submit" class="btn btn--primary btn--lg btn--block">
          인증 코드 받기
        </button>

        <div class="auth-divider">또는</div>

        <button type="button" class="btn btn--outline btn--lg btn--block" disabled>
          <svg class="icon" viewBox="0 0 24 24" fill="#FEE500">
            <path d="M12 3C7.03 3 3 6.14 3 10.1c0 2.52 1.65 4.74 4.15 6.02-.18.65-.65 2.38-.74 2.75-.11.46.17.46.36.34.15-.1 2.39-1.62 3.36-2.28.62.09 1.27.14 1.93.14 4.97 0 9-3.14 9-7.07S16.97 3 12 3z"/>
          </svg>
          카카오로 시작하기
          <span class="badge" style="margin-left:auto; background:var(--gray-100); color:var(--gray-500);">준비중</span>
        </button>

        <p style="text-align:center; margin-top:24px; font-size:13px; color:var(--gray-500); line-height:1.7;">
          계속 진행하시면 <a href="#" style="color:var(--primary); text-decoration:underline;">서비스 이용약관</a> 및
          <a href="#" style="color:var(--primary); text-decoration:underline;">개인정보 처리방침</a>에 동의하는 것으로 간주됩니다.
        </p>
      </form>
    </div>

    <p style="margin-top: 24px; color: var(--gray-500); font-size:13px;">
      문의 사항이 있으신가요? <a href="mailto:mrthr@myrealtrip.com" style="color:var(--primary); font-weight:500;">mrthr@myrealtrip.com</a>
    </p>
  </div>

  <script src="assets/partials.js"></script>
</body>
</html>
