<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>경력증명서 발급 완료 — MyRealTrip Alumni</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div data-include="header" data-active="certificates"></div>

  <main>
    <div class="container-narrow" style="padding: 40px 24px 80px;">
      <!-- Stepper -->
      <div class="stepper">
        <div class="step done"><span class="step__num"><span data-icon="check" style="display:inline-flex; width:12px; height:12px;"></span></span><span>입력</span></div>
        <div class="step-bar"></div>
        <div class="step done"><span class="step__num"><span data-icon="check" style="display:inline-flex; width:12px; height:12px;"></span></span><span>미리보기</span></div>
        <div class="step-bar"></div>
        <div class="step done"><span class="step__num"><span data-icon="check" style="display:inline-flex; width:12px; height:12px;"></span></span><span>발급 완료</span></div>
      </div>

      <div class="card" style="padding: 40px;">
        <div class="row gap-2 mb-4">
          <span class="badge badge--success"><span class="dot"></span> 발급 완료</span>
        </div>

        <h1 class="h1 mb-2">경력증명서가 발급되었습니다</h1>
        <p class="body text-muted mb-8">
          PDF 파일이 yoonjae.lee@gmail.com 으로 발송되었습니다.
        </p>

        <!-- 발급 정보 -->
        <div style="border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 20px; margin-bottom: 24px;">
          <div class="row" style="justify-content:space-between; padding: 8px 0;">
            <span class="caption">증명서 번호</span>
            <span class="body-sm font-semibold">MRT-2026-05-14-00138</span>
          </div>
          <div class="divider" style="margin: 8px 0;"></div>
          <div class="row" style="justify-content:space-between; padding: 8px 0;">
            <span class="caption">발급 일시</span>
            <span class="body-sm font-semibold">2026.05.14 15:42</span>
          </div>
          <div class="divider" style="margin: 8px 0;"></div>
          <div class="row" style="justify-content:space-between; padding: 8px 0;">
            <span class="caption">유효 기간</span>
            <span class="body-sm font-semibold">2026.06.13 까지 (발급 후 30일)</span>
          </div>
          <div class="divider" style="margin: 8px 0;"></div>
          <div class="row" style="justify-content:space-between; padding: 8px 0;">
            <span class="caption">발급 부수 · 언어</span>
            <span class="body-sm font-semibold">1부 · 국문</span>
          </div>
        </div>

        <div class="row gap-2">
          <button class="btn btn--primary">PDF 다운로드</button>
          <a href="dashboard.html" class="btn btn--outline">홈으로</a>
        </div>
      </div>

      <!-- 추가 안내 -->
      <div class="grid grid-2 grid--gap-lg mt-8">
        <a href="history.html" class="card card--interactive" style="text-decoration:none; color:inherit;">
          <div class="body font-semibold">신청 내역 보기</div>
          <div class="caption mt-1">발급 이력 및 처리 상태 확인 →</div>
        </a>
        <a href="certificates.html" class="card card--interactive" style="text-decoration:none; color:inherit;">
          <div class="body font-semibold">다른 증명서 발급</div>
          <div class="caption mt-1">급여명세서, 원천징수영수증 등 →</div>
        </a>
      </div>
    </div>
  </main>

  <div data-include="footer"></div>
  <script src="assets/partials.js"></script>
</body>
</html>
