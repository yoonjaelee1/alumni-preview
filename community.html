<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>커뮤니티 — MyRealTrip Alumni</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <div data-include="header" data-active="community"></div>

  <main>
    <section style="padding: 80px 0 64px;">
      <div class="container-narrow" style="text-align: left;">
        <div class="eyebrow">Community · 준비중</div>
        <h1 class="display-1" style="margin-bottom: 20px;">알럼나이 커뮤니티</h1>
        <p class="body-lg text-muted" style="margin-bottom: 48px;">
          증명서 발급 외에도 마이리얼트립 알럼나이 회원 간의 네트워킹과 정보 공유를 지원하는
          커뮤니티 기능을 준비하고 있습니다. 오픈 시점에 등록된 이메일로 안내해 드리겠습니다.
        </p>

        <div class="card" style="padding: 32px;">
          <h3 class="h3 mb-2">오픈 소식 받아보기</h3>
          <p class="text-muted body-sm mb-6" style="line-height:1.7;">
            커뮤니티가 오픈되면 등록된 이메일로 안내해 드립니다.
          </p>
          <div class="row gap-3" style="flex-wrap: wrap;">
            <input class="input" placeholder="yoonjae.lee@gmail.com" value="yoonjae.lee@gmail.com" readonly style="flex: 1; min-width: 220px;" />
            <button class="btn btn--primary">사전 등록</button>
          </div>
          <p class="caption mt-4">알럼나이 가입 시 사용한 이메일로 자동 등록됩니다.</p>
        </div>
      </div>
    </section>
  </main>

  <div data-include="footer"></div>
  <script src="assets/partials.js"></script>
</body>
</html>
